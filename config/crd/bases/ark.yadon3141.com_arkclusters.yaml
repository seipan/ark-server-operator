---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: arkclusters.ark.yadon3141.com
spec:
  group: ark.yadon3141.com
  names:
    kind: ArkCluster
    listKind: ArkClusterList
    plural: arkclusters
    shortNames:
    - arkc
    singular: arkcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterName
      name: Cluster
      type: string
    - jsonPath: .status.managedServers
      name: Servers
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: ArkCluster is the Schema for the arkclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ArkCluster
            properties:
              arkManager:
                description: |-
                  ArkManager configures the arkmanager CLI behavior and the ARK server launch
                  flags it passes through. The Reconciler renders this into arkmanager.cfg.
                properties:
                  backupPreUpdate:
                    default: true
                    description: |-
                      BackupPreUpdate runs a save+backup before applying server updates.
                      Maps to arkmanager's arkBackupPreUpdate.
                    type: boolean
                  banListURL:
                    description: BanListURL is the upstream ban list pulled by ARK.
                    type: string
                  flags:
                    description: |-
                      Flags are passed to the ARK server as bare `-flag` arguments
                      (arkflag_* keys in arkmanager.cfg).
                    properties:
                      crossplay:
                        type: boolean
                      log:
                        type: boolean
                      noBattlEye:
                        type: boolean
                      noTransferFromFiltering:
                        type: boolean
                      useAllAvailableCores:
                        type: boolean
                    type: object
                  maxBackupSizeGB:
                    default: 2
                    description: |-
                      MaxBackupSizeGB caps the total local backup size before arkmanager rotates them.
                      Maps to arkmanager's arkMaxBackupSizeGB.
                    format: int32
                    minimum: 0
                    type: integer
                  messages:
                    description: |-
                      Messages are the in-game broadcast templates. Each must contain a `%d`
                      placeholder which arkmanager substitutes with the remaining minutes or seconds.
                    properties:
                      warnRestartMinutes:
                        type: string
                      warnRestartSeconds:
                        type: string
                      warnShutdownMinutes:
                        type: string
                      warnShutdownSeconds:
                        type: string
                      warnUpdateMinutes:
                        type: string
                      warnUpdateSeconds:
                        type: string
                    type: object
                  options:
                    description: |-
                      Options are passed to the ARK server as `-flag=value` arguments
                      (arkopt_* keys in arkmanager.cfg).
                    properties:
                      activeEvent:
                        description: ActiveEvent triggers an ARK seasonal in-game
                          event.
                        enum:
                        - Easter
                        - Arkaeology
                        - ExtinctionChronicles
                        - WinterWonderland
                        - vday
                        - Summer
                        - FearEvolved
                        - TurkeyTrial
                        - birthday
                        - None
                        type: string
                    type: object
                  warnMinutes:
                    default: 15
                    description: |-
                      WarnMinutes is the lead time for in-game shutdown/update/restart warnings.
                      Maps to arkmanager's arkwarnminutes.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              backup:
                description: |-
                  Backup defines the cluster-wide backup schedule and destination.
                  Every ArkServer in this cluster is backed up on this schedule.
                  Omit to disable scheduled backups.
                properties:
                  destination:
                    description: Destination is the remote object store to upload
                      artifacts to.
                    properties:
                      s3:
                        description: S3 holds the Amazon S3 (or S3-compatible) configuration.
                        properties:
                          bucket:
                            description: Bucket name.
                            minLength: 1
                            type: string
                          credentialsSecretRef:
                            description: |-
                              CredentialsSecretRef points at a Secret holding S3 credentials.
                              Expected data keys: "accessKeyID" and "secretAccessKey".
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                          endpointURL:
                            description: |-
                              EndpointURL overrides the AWS endpoint for S3-compatible providers
                              (MinIO, R2, Wasabi, B2, GCS interop, etc.). Leave empty for AWS S3.
                            type: string
                          pathPrefix:
                            description: |-
                              PathPrefix is prepended to every uploaded object key.
                              Final layout: s3://<bucket>/<pathPrefix>/<arkServer>/<timestamp>/...
                            type: string
                          region:
                            description: Region for the bucket.
                            minLength: 1
                            type: string
                        required:
                        - bucket
                        - credentialsSecretRef
                        - region
                        type: object
                    required:
                    - s3
                    type: object
                  method:
                    default: arkmanager
                    description: |-
                      Method selects how the backup is taken inside the Pod.
                        arkmanager: invoke `arkmanager backup` (handles SaveWorld + .ark formatting).
                        tar:        invoke a raw `tar` of the SavedArks directory (legacy behavior).
                    enum:
                    - arkmanager
                    - tar
                    type: string
                  preBackup:
                    description: PreBackup actions executed before the backup is taken.
                    properties:
                      announceLeadSeconds:
                        description: AnnounceLeadSeconds is the wait between announcement
                          and backup start.
                        format: int32
                        minimum: 0
                        type: integer
                      announceMessage:
                        description: AnnounceMessage is broadcast in-game before backup
                          starts.
                        type: string
                      saveWorld:
                        default: true
                        description: |-
                          SaveWorld issues an in-game SaveWorld over RCON before the backup begins.
                          Strongly recommended to avoid capturing an in-flight save.
                        type: boolean
                    type: object
                  retention:
                    description: Retention controls how long uploaded backups are
                      kept.
                    properties:
                      keepLastN:
                        description: |-
                          KeepLastN keeps the N most recent backups per ArkServer.
                          0 disables count-based pruning.
                        format: int32
                        minimum: 0
                        type: integer
                      maxBackupSizeGB:
                        description: |-
                          MaxBackupSizeGB caps the total uploaded backup size before older artifacts
                          are pruned. 0 disables size-based pruning.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  schedule:
                    description: |-
                      Schedule is a cron expression in standard 5-field form.
                      Every ArkServer in this cluster is backed up on this schedule.
                    minLength: 9
                    type: string
                required:
                - destination
                - schedule
                type: object
              clusterName:
                description: |-
                  ClusterName is the in-game cluster identifier.
                  Reconciler maps this to arkmanager's arkopt_clusterid option.
                  ArkServers sharing the same ClusterName can transfer characters via cluster travel.
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
                type: string
              game:
                description: |-
                  Game is the source for Game.ini contents shared across all ArkServers.
                  Contains gameplay multipliers, auto-unlocked engrams, etc.
                properties:
                  configMapRef:
                    description: ConfigMapRef references a ConfigMap whose data key
                      holds the ini contents.
                    properties:
                      key:
                        description: Key inside the ConfigMap's data map.
                        minLength: 1
                        type: string
                      name:
                        description: Name of the ConfigMap in the same namespace as
                          the ArkCluster.
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  inline:
                    description: |-
                      Inline embeds the ini contents directly in the CR.
                      Convenient for small configs; prefer ConfigMapRef for large files.
                    type: string
                type: object
              gameUserSettings:
                description: |-
                  GameUserSettings is the source for GameUserSettings.ini contents shared across
                  all ArkServers. Contains PvE/PvP rules, structure limits, server rules, etc.
                properties:
                  configMapRef:
                    description: ConfigMapRef references a ConfigMap whose data key
                      holds the ini contents.
                    properties:
                      key:
                        description: Key inside the ConfigMap's data map.
                        minLength: 1
                        type: string
                      name:
                        description: Name of the ConfigMap in the same namespace as
                          the ArkCluster.
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  inline:
                    description: |-
                      Inline embeds the ini contents directly in the CR.
                      Convenient for small configs; prefer ConfigMapRef for large files.
                    type: string
                type: object
              image:
                description: Image is the ARK server container image used by every
                  ArkServer in this cluster.
                properties:
                  digest:
                    description: Digest pins a specific image digest. Authoritative
                      for image pulls.
                    pattern: ^sha256:[a-f0-9]{64}$
                    type: string
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy controls when the image is pulled.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    description: Repository is the image repository, e.g. "nightdragon1/ark-docker".
                    minLength: 1
                    type: string
                  tag:
                    description: |-
                      Tag is the human-readable image tag (e.g. "v1.2.3").
                      Not used for the actual pull — Digest is. Keep Tag in sync with Digest
                      so Renovate can bump both together.
                    maxLength: 128
                    minLength: 1
                    pattern: ^[\w][\w.-]{0,127}$
                    type: string
                required:
                - digest
                - repository
                - tag
                type: object
              passwords:
                description: |-
                  Passwords references the Secret containing server and admin passwords.
                  The Secret is expected to be created out-of-band (e.g. via `kubectl apply`);
                  it is not managed in Git.
                properties:
                  secretRef:
                    description: |-
                      SecretRef points at the Secret in the same namespace. The Secret must
                      contain the keys named by Keys below.
                    properties:
                      keys:
                        description: Keys maps Secret data keys to ARK roles.
                        properties:
                          adminPassword:
                            default: adminPass
                            description: AdminPassword is the Secret data key holding
                              the admin (RCON) password.
                            type: string
                          serverPassword:
                            default: serverPass
                            description: ServerPassword is the Secret data key holding
                              the in-game server password.
                            type: string
                        type: object
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - keys
                    - name
                    type: object
                required:
                - secretRef
                type: object
              playerLists:
                description: PlayerLists defines Steam ID lists shared across all
                  ArkServers.
                properties:
                  allowedCheaters:
                    description: |-
                      AllowedCheaters are Steam IDs allowed to use the in-game console cheats.
                      Rendered as AllowedCheaterSteamIDs.txt.
                    items:
                      type: string
                    type: array
                  exclusiveJoinList:
                    description: |-
                      ExclusiveJoinList, when non-empty, restricts joining to listed Steam IDs.
                      Rendered as PlayersExclusiveJoinList.txt.
                    items:
                      type: string
                    type: array
                  joinNoCheck:
                    description: |-
                      JoinNoCheck are Steam IDs that bypass the join checks (password, etc.).
                      Rendered as PlayersJoinNoCheck.txt.
                    items:
                      type: string
                    type: array
                type: object
              sharedStorage:
                description: |-
                  SharedStorage holds the ReadWriteMany volume mounted at /ark-shared in every
                  ArkServer Pod. ARK uses it for cluster travel (character transfer between maps).
                properties:
                  accessModes:
                    description: AccessModes for a newly created PVC. Must include
                      ReadWriteMany for cluster travel.
                    items:
                      type: string
                    type: array
                  existingClaimName:
                    description: |-
                      ExistingClaimName references a pre-existing PersistentVolumeClaim in the
                      same namespace. When set, the Reconciler does not create a PVC.
                    type: string
                  mountPath:
                    default: /ark-shared
                    description: |-
                      MountPath where the shared volume is exposed inside the ARK container.
                      arkmanager's arkopt_ClusterDirOverride is set to this path.
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: Size is the requested storage size for a newly created
                      PVC.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: |-
                      StorageClassName is used when the Reconciler creates a new PVC.
                      The class must support ReadWriteMany.
                    type: string
                type: object
            required:
            - arkManager
            - clusterName
            - game
            - gameUserSettings
            - image
            - passwords
            - sharedStorage
            type: object
          status:
            description: status defines the observed state of ArkCluster
            properties:
              conditions:
                description: |-
                  Conditions follow standard Kubernetes condition semantics.
                  Known types:
                    Ready              — overall readiness
                    ConfigsApplied     — global ConfigMaps reconciled to desired state
                    SharedStorageBound — cluster-travel PVC is Bound
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              globalConfigMapsReady:
                description: |-
                  GlobalConfigMapsReady indicates the operator-managed ConfigMaps
                  (Game.ini, GameUserSettings.ini, arkmanager.cfg, player lists) are applied.
                type: boolean
              imageDigest:
                description: |-
                  ImageDigest is the digest actually pulled by managed Pods.
                  May lag behind spec.image.digest while a rollout is in progress.
                type: string
              lastReconcileTime:
                description: LastReconcileTime is when the controller last reconciled
                  this resource.
                format: date-time
                type: string
              managedServers:
                description: ManagedServers is the number of ArkServers referencing
                  this cluster.
                format: int32
                type: integer
              sharedStorageReady:
                description: SharedStorageReady indicates the cluster-travel PVC is
                  bound.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
